# render.yaml — Render Blueprint
# Defines both services so Render can deploy the whole stack from one GitHub repo.
# Push this file to the root of your repo, then go to render.com → New → Blueprint.

services:
  # ── Backend (Node.js API) ────────────────────────────────────────────────────
  - type: web
    name: rxregistry-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # You paste this in the Render dashboard — never hard-code it
      - key: CORS_ORIGIN
        value: https://rxregistry-frontend.onrender.com   # update if you use a custom domain
      - key: PORT
        value: 10000         # Render's default — do not change

  # ── Frontend (React static site) ────────────────────────────────────────────
  - type: web
    name: rxregistry-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html    # SPA fallback for React Router
    envVars:
      - key: VITE_API_URL
        value: https://rxregistry-backend.onrender.com/api/v1
